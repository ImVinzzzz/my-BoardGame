<!doctype html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generatore giochi da tavolo — solo per uso interno</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    input,
    textarea,
    select {
      color-scheme: dark;
    }
  </style>
</head>

<body class="min-h-screen bg-[#0B1E33] text-[#EAF0F6]">
  <div class="mx-auto max-w-4xl px-6 py-10">
    <header class="mb-8">
      <div class="flex items-center gap-3 text-[#FF7A29]">
        <i class="fa-solid fa-wrench" aria-hidden="true"></i>
        <span class="text-xs font-semibold uppercase tracking-[0.2em]">Tool interno</span>
      </div>
      <h1 class="mt-2 font-bold text-2xl sm:text-3xl">Generatore scheda GdT</h1>
      <p class="mt-2 text-sm text-[#9FB3C8] max-w-2xl">
        Compila il form, premi <strong>"Genera codice"</strong> e incolla il risultato in
        <code class="rounded bg-[#13263D] px-1.5 py-0.5 text-[#FF7A29]">src/data/boardgame.ts</code>,
        subito dopo un oggetto esistente (prima della <code
          class="rounded bg-[#13263D] px-1.5 py-0.5 text-[#FF7A29]">]</code> finale dell'array).
      </p>
    </header>

    <form id="game-form" class="flex flex-col gap-8" onsubmit="return false;">
      <!-- Dati principali -->
      <section class="rounded-xl border border-[#23405C] bg-[#13263D] p-5 flex flex-col gap-4">
        <h2 class="font-bold text-lg text-[#EAF0F6]">Dati principali</h2>

        <div>
          <label class="block text-sm font-semibold mb-1" for="title">Titolo *</label>
          <input id="title" type="text"
            class="w-full rounded-lg bg-[#081320] border border-[#23405C] px-3 py-2 focus:outline-none focus:border-[#FF7A29]"
            placeholder="I Sentieri di Latta" />
        </div>

        <div>
          <label class="block text-sm font-semibold mb-1" for="subtitle">Sottotitolo</label>
          <input id="subtitle" type="text"
            class="w-full rounded-lg bg-[#081320] border border-[#23405C] px-3 py-2 focus:outline-none focus:border-[#FF7A29]"
            placeholder="Costruisci rotte commerciali nell'Europa dello stagno" />
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold mb-1" for="slug">
              Slug <span class="text-[#6B829B] font-normal">(generato dal titolo, modificabile)</span>
            </label>
            <input id="slug" type="text"
              class="w-full rounded-lg bg-[#081320] border border-[#23405C] px-3 py-2 focus:outline-none focus:border-[#FF7A29]" />
          </div>
          <div>
            <label class="block text-sm font-semibold mb-1" for="gameId">
              ID <span class="text-[#6B829B] font-normal">(generato dal titolo, modificabile)</span>
            </label>
            <input id="gameId" type="text"
              class="w-full rounded-lg bg-[#081320] border border-[#23405C] px-3 py-2 focus:outline-none focus:border-[#FF7A29]" />
          </div>
        </div>

        <div>
          <label class="block text-sm font-semibold mb-1" for="coverImageUrl">
            URL immagine di copertina <span class="text-[#6B829B] font-normal">(generato, modificabile)</span>
          </label>
          <input id="coverImageUrl" type="text"
            class="w-full rounded-lg bg-[#081320] border border-[#23405C] px-3 py-2 focus:outline-none focus:border-[#FF7A29]"
            placeholder="/images/slug.jpg" />
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold mb-1" for="type">Tipologia *</label>
            <select id="type"
              class="w-full rounded-lg bg-[#081320] border border-[#23405C] px-3 py-2 focus:outline-none focus:border-[#FF7A29]">
              <option value="">Seleziona...</option>
              <option value="Astratto">Astratto</option>
              <option value="Competitivo">Competitivo</option>
              <option value="Cooperativo">Cooperativo</option>
              <option value="Excape Game">Excape Game</option>
              <option value="Filler">Filler</option>
              <option value="Party Game">Party Game</option>
              <option value="Strategico">Strategico</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-semibold mb-1" for="genres">Genere</label>
            <input id="genres" type="text"
              class="w-full rounded-lg bg-[#081320] border border-[#23405C] px-3 py-2 focus:outline-none focus:border-[#FF7A29]"
              placeholder="Strategico, Astratto (separati da virgola)" />
          </div>
        </div>

        <div>
          <label class="block text-sm font-semibold mb-1">Classificazione *</label>
          <div class="flex items-center gap-3">
            <div id="rating-stars" class="flex items-center gap-1"></div>
            <span id="rating-value-label" class="text-sm text-[#9FB3C8]">0/5</span>
            <button type="button" onclick="setRating(0)"
              class="text-xs text-[#6B829B] hover:text-[#FF7A29]">Azzera</button>
          </div>
          <input type="hidden" id="rating" value="0" />
        </div>

        <div>
          <label class="block text-sm font-semibold mb-1" for="description">Descrizione *</label>
          <textarea id="description" rows="3"
            class="w-full rounded-lg bg-[#081320] border border-[#23405C] px-3 py-2 focus:outline-none focus:border-[#FF7A29]"></textarea>
        </div>

        <div>
          <label class="block text-sm font-semibold mb-1" for="synopsis">Altro</label>
          <textarea id="synopsis" rows="3"
            class="w-full rounded-lg bg-[#081320] border border-[#23405C] px-3 py-2 focus:outline-none focus:border-[#FF7A29]"></textarea>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
          <div>
            <label class="block text-sm font-semibold mb-1" for="playerCount">Giocatori</label>
            <input id="playerCount" type="text"
              class="w-full rounded-lg bg-[#081320] border border-[#23405C] px-3 py-2 focus:outline-none focus:border-[#FF7A29]"
              placeholder="2-4 giocatori" />
          </div>
          <div>
            <label class="block text-sm font-semibold mb-1" for="duration">Durata</label>
            <input id="duration" type="text"
              class="w-full rounded-lg bg-[#081320] border border-[#23405C] px-3 py-2 focus:outline-none focus:border-[#FF7A29]"
              placeholder="60-90 minuti" />
          </div>
          <div>
            <label class="block text-sm font-semibold mb-1" for="ageRange">Fascia d'età</label>
            <input id="ageRange" type="text"
              class="w-full rounded-lg bg-[#081320] border border-[#23405C] px-3 py-2 focus:outline-none focus:border-[#FF7A29]"
              placeholder="10+" />
          </div>
        </div>

        <div>
          <label class="block text-sm font-semibold mb-1" for="notes">Note</label>
          <textarea id="notes" rows="2"
            class="w-full rounded-lg bg-[#081320] border border-[#23405C] px-3 py-2 focus:outline-none focus:border-[#FF7A29]"></textarea>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold mb-1 text-green-400" for="pros">
              <i class="fa-solid fa-thumbs-up mr-1"></i> PRO
            </label>
            <textarea id="pros" rows="2"
              class="w-full rounded-lg bg-[#081320] border border-[#23405C] px-3 py-2 focus:outline-none focus:border-green-500"
              placeholder="Aspetti positivi, punti di forza..."></textarea>
          </div>
          <div>
            <label class="block text-sm font-semibold mb-1 text-red-400" for="cons">
              <i class="fa-solid fa-thumbs-down mr-1"></i> CONTRO
            </label>
            <textarea id="cons" rows="2"
              class="w-full rounded-lg bg-[#081320] border border-[#23405C] px-3 py-2 focus:outline-none focus:border-red-500"
              placeholder="Aspetti negativi, punti deboli..."></textarea>
          </div>
        </div>

        <div>
          <label class="block text-sm font-semibold mb-1" for="officialUrl">Link esterno</label>
          <input id="officialUrl" type="text"
            class="w-full rounded-lg bg-[#081320] border border-[#23405C] px-3 py-2 focus:outline-none focus:border-[#FF7A29]"
            placeholder="https://..." />
        </div>

        <div class="flex flex-wrap gap-6">
          <label class="inline-flex items-center gap-2 text-sm">
            <input id="favorite" type="checkbox" class="h-4 w-4 accent-[#FF3D81]" />
            Preferito
          </label>
          <label class="inline-flex items-center gap-2 text-sm">
            <input id="played" type="checkbox" class="h-4 w-4 accent-[#FF7A29]" />
            Ci ho già giocato
          </label>
        </div>
      </section>

      <!-- Materiali da scaricare -->
      <section class="rounded-xl border border-[#23405C] bg-[#13263D] p-5 flex flex-col gap-4">
        <div class="flex items-center justify-between">
          <h2 class="font-bold text-lg text-[#EAF0F6]">Da scaricare</h2>
          <button type="button" onclick="addDownloadRow()"
            class="inline-flex items-center gap-1.5 rounded-full bg-[#FF7A29] px-3 py-1.5 text-xs font-semibold text-[#081320] hover:bg-[#FFB066]">
            <i class="fa-solid fa-plus" aria-hidden="true"></i> Aggiungi materiale
          </button>
        </div>
        <div id="downloads-container" class="flex flex-col gap-4"></div>
      </section>

      <div class="flex flex-wrap gap-3">
        <button type="button" onclick="generateCode()"
          class="inline-flex items-center gap-2 rounded-full bg-[#FF7A29] px-5 py-2.5 text-sm font-semibold text-[#081320] hover:bg-[#FFB066]">
          <i class="fa-solid fa-code" aria-hidden="true"></i> Genera codice
        </button>
        <button type="button" onclick="resetForm()"
          class="inline-flex items-center gap-2 rounded-full border border-[#23405C] px-5 py-2.5 text-sm font-semibold text-[#C3D1DE] hover:border-[#FF7A29]/50">
          <i class="fa-solid fa-rotate-left" aria-hidden="true"></i> Svuota form
        </button>
      </div>
    </form>

    <!-- Output -->
    <section id="output-section" class="mt-10 hidden flex flex-col gap-3">
      <div class="flex items-center justify-between">
        <h2 class="font-bold text-lg text-[#EAF0F6]">Codice generato</h2>
        <button type="button" onclick="copyCode()"
          class="inline-flex items-center gap-1.5 rounded-full border border-[#FF7A29]/40 px-3 py-1.5 text-xs font-semibold text-[#FF7A29] hover:bg-[#FF7A29]/10">
          <i class="fa-solid fa-copy" aria-hidden="true"></i> <span id="copy-label">Copia codice</span>
        </button>
      </div>
      <textarea id="output" readonly rows="20"
        class="w-full rounded-lg bg-[#081320] border border-[#23405C] p-4 font-mono text-xs text-[#C3D1DE] focus:outline-none"></textarea>
    </section>
  </div>

  <script>
    let downloadRowCount = 0;
    let slugTouched = false;
    let coverTouched = false;
    let currentRating = 0;

    const DOWNLOAD_DEFAULTS = [{ label: 'Regolamento', icon: 'fa-solid fa-book' }];

    const ICON_SUGGESTIONS = [
      'fa-solid fa-book',
      'fa-solid fa-puzzle-piece',
      'fa-solid fa-clipboard-list',
      'fa-solid fa-map',
      'fa-solid fa-scroll',
      'fa-solid fa-file-pdf',
      'fa-solid fa-image',
      'fa-solid fa-dice-d20',
    ];

    /** Rimuove accenti/apostrofi e produce uno slug url-safe. */
    function slugify(value) {
      return value
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .toLowerCase()
        .replace(/['']/g, '')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '');
    }

    /** Stringa letterale TS tra doppi apici, con escape sicuro (gestisce apostrofi e virgolette). */
    function tsString(value) {
      return JSON.stringify(value || '');
    }

    /* --- Classificazione (stelle) --- */

    function renderRatingStars() {
      const container = document.getElementById('rating-stars');
      container.innerHTML = '';
      for (let i = 1; i <= 5; i += 1) {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'text-xl px-0.5 focus:outline-none';
        const filled = i <= currentRating;
        button.innerHTML = `<i class="${filled ? 'fa-solid' : 'fa-regular'} fa-star ${filled ? 'text-[#FFD60A]' : 'text-[#3A5570]'}" aria-hidden="true"></i>`;
        button.onclick = () => setRating(i);
        container.appendChild(button);
      }
    }

    function setRating(value) {
      currentRating = value;
      document.getElementById('rating').value = String(value);
      document.getElementById('rating-value-label').textContent = `${value}/5`;
      renderRatingStars();
    }

    /* --- Materiali da scaricare --- */

    function createDownloadRow(defaults) {
      downloadRowCount += 1;
      const rowId = downloadRowCount;
      const wrapper = document.createElement('div');
      wrapper.className = 'rounded-lg border border-[#23405C] bg-[#081320] p-4 flex flex-col gap-3';
      wrapper.dataset.rowId = rowId;
      wrapper.innerHTML = `
          <div class="flex items-center justify-between">
            <span class="text-xs font-semibold uppercase tracking-wide text-[#6B829B]">Materiale #${rowId}</span>
            <button type="button" onclick="removeDownloadRow(${rowId})" class="text-xs text-[#6B829B] hover:text-[#FF7A29]">
              <i class="fa-solid fa-trash-can" aria-hidden="true"></i> Rimuovi
            </button>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <input data-field="label" type="text" placeholder="Etichetta (es. Regolamento)" value="${defaults?.label ?? ''}" class="w-full rounded-lg bg-[#13263D] border border-[#23405C] px-3 py-2 text-sm focus:outline-none focus:border-[#FF7A29]" />
            <input data-field="fileSize" type="text" placeholder="Dimensione file (es. 4.2 MB)" class="w-full rounded-lg bg-[#13263D] border border-[#23405C] px-3 py-2 text-sm focus:outline-none focus:border-[#FF7A29]" />
          </div>
          <input data-field="description" type="text" placeholder="Descrizione (es. Manuale ufficiale in italiano, 24 pagine)" class="w-full rounded-lg bg-[#13263D] border border-[#23405C] px-3 py-2 text-sm focus:outline-none focus:border-[#FF7A29]" />
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
	    <div>
		<label class="block text-xs font-semibold mb-1 text-[#6B829B]">Icona <span class="font-normal">(seleziona quella più adatta)</span></label>
            	<input data-field="icon" type="text" list="icon-suggestions" placeholder="Icona FontAwesome" value="${defaults?.icon ?? 'fa-solid fa-file'}" class="w-full rounded-lg bg-[#13263D] border border-[#23405C] px-3 py-2 text-sm focus:outline-none focus:border-[#FF7A29]" />
	    </div>
            <div>
              <label class="block text-xs font-semibold mb-1 text-[#6B829B]">URL file <span class="font-normal">(generato dallo slug, modificabile)</span></label>
              <input data-field="fileUrl" type="text" placeholder="/pdfs/slug_1.pdf" class="w-full rounded-lg bg-[#13263D] border border-[#23405C] px-3 py-2 text-sm focus:outline-none focus:border-[#FF7A29]" />
            </div>
          </div>
        `;
      document.getElementById('downloads-container').appendChild(wrapper);

      const fileUrlInput = wrapper.querySelector('[data-field="fileUrl"]');
      fileUrlInput.addEventListener('input', () => {
        wrapper.dataset.fileUrlTouched = 'true';
      });
      updateFileUrls();
    }

    function addDownloadRow() {
      createDownloadRow();
    }

    function removeDownloadRow(rowId) {
      const row = document.querySelector(`[data-row-id="${rowId}"]`);
      if (row) row.remove();
      updateFileUrls();
    }

    /** Suffisso del file in base alla posizione (1-based) della riga nel form. */
    function suffixForPosition(position) {
      return String(position);
    }

    /** Ricalcola gli URL "/pdfs/slug_suffisso.pdf" per tutte le righe non modificate a mano. */
    function updateFileUrls() {
      const slug = document.getElementById('slug').value.trim();
      const rows = Array.from(document.querySelectorAll('#downloads-container > div'));
      rows.forEach((row, index) => {
        const input = row.querySelector('[data-field="fileUrl"]');
        if (!input || row.dataset.fileUrlTouched === 'true') return;
        if (!slug) {
          input.value = '';
          return;
        }
        const position = index + 1;
        input.value = `/pdfs/${slug}_${suffixForPosition(position)}.pdf`;
      });
    }

    function initIconSuggestions() {
      const datalist = document.createElement('datalist');
      datalist.id = 'icon-suggestions';
      datalist.innerHTML = ICON_SUGGESTIONS.map((icon) => `<option value="${icon}"></option>`).join('');
      document.body.appendChild(datalist);
    }

    function initAutoFields() {
      const titleInput = document.getElementById('title');
      const slugInput = document.getElementById('slug');
      const idInput = document.getElementById('gameId');
      const coverInput = document.getElementById('coverImageUrl');

      slugInput.addEventListener('input', () => {
        slugTouched = true;
        if (idInput.dataset.touched !== 'true') {
          idInput.value = slugInput.value;
        }
        updateFileUrls();
      });
      coverInput.addEventListener('input', () => { coverTouched = true; });
      idInput.addEventListener('input', () => { idInput.dataset.touched = 'true'; });

      titleInput.addEventListener('input', () => {
        const title = titleInput.value.trim();
        const autoSlug = slugify(title);

        if (!slugTouched) {
          slugInput.value = autoSlug;
        }
        if (idInput.dataset.touched !== 'true') {
          idInput.value = slugInput.value;
        }
        if (!coverTouched) {
          coverInput.value = `/images/${slugInput.value}.jpg`;
        }
        updateFileUrls();
      });
    }

    /** Indenta ogni riga di un blocco di testo di N spazi (usato per gli array annidati). */
    function indentBlock(text, spaces) {
      const pad = ' '.repeat(spaces);
      return text
        .split('\n')
        .map((line) => pad + line)
        .join('\n');
    }

    function buildDownloadsCode(mainId) {
      const rows = Array.from(document.querySelectorAll('#downloads-container > div'));
      const items = rows
        .map((row) => {
          const get = (field) => row.querySelector(`[data-field="${field}"]`).value.trim();
          const label = get('label');
          if (!label) return null; // riga vuota, viene ignorata

          const description = get('description');
          const fileUrl = get('fileUrl') || '#';
          const icon = get('icon') || 'fa-solid fa-file';
          const fileSize = get('fileSize');
          const downloadId = `${mainId}-${slugify(label) || 'materiale'}`;

          const lines = [
            `id: ${tsString(downloadId)},`,
            `label: ${tsString(label)},`,
          ];
          if (description) lines.push(`description: ${tsString(description)},`);
          lines.push(`fileUrl: ${tsString(fileUrl)},`);
          lines.push(`icon: ${tsString(icon)},`);
          if (fileSize) lines.push(`fileSize: ${tsString(fileSize)},`);

          return '{\n' + indentBlock(lines.join('\n'), 2) + '\n},';
        })
        .filter(Boolean);

      if (items.length === 0) return '[]';

      return '[\n' + indentBlock(items.join('\n'), 2) + '\n]';
    }

    function generateCode() {
      const title = document.getElementById('title').value.trim();
      const description = document.getElementById('description').value.trim();
      const type = document.getElementById('type').value.trim();

      if (!title || !description || !type) {
        alert('Compila almeno Titolo, Descrizione e Tipologia prima di generare il codice.');
        return;
      }

      const slug = document.getElementById('slug').value.trim() || slugify(title);
      const id = document.getElementById('gameId').value.trim() || slug;
      const subtitle = document.getElementById('subtitle').value.trim();
      const coverImageUrl = document.getElementById('coverImageUrl').value.trim();
      const genres = document
        .getElementById('genres')
        .value.split(',')
        .map((g) => g.trim())
        .filter(Boolean);
      const rating = Number(document.getElementById('rating').value) || 0;
      const synopsis = document.getElementById('synopsis').value.trim();
      const playerCount = document.getElementById('playerCount').value.trim();
      const duration = document.getElementById('duration').value.trim();
      const ageRange = document.getElementById('ageRange').value.trim();
      const notes = document.getElementById('notes').value.trim();
      const pros = document.getElementById('pros').value.trim();
      const cons = document.getElementById('cons').value.trim();
      const officialUrl = document.getElementById('officialUrl').value.trim();
      const favorite = document.getElementById('favorite').checked;
      const played = document.getElementById('played').checked;

      const lines = [
        `id: ${tsString(id)},`,
        `slug: ${tsString(slug)},`,
        `title: ${tsString(title)},`,
        `subtitle: ${tsString(subtitle)},`,
        `coverImageUrl: ${tsString(coverImageUrl)},`,
        `description: ${tsString(description)},`,
        `type: ${tsString(type)},`,
        `genres: [${genres.map(tsString).join(', ')}],`,
        `rating: ${rating},`,
      ];
      if (synopsis) lines.push(`synopsis: ${tsString(synopsis)},`);
      if (playerCount) lines.push(`playerCount: ${tsString(playerCount)},`);
      if (duration) lines.push(`duration: ${tsString(duration)},`);
      if (ageRange) lines.push(`ageRange: ${tsString(ageRange)},`);
      if (notes) lines.push(`notes: ${tsString(notes)},`);
      if (pros) lines.push(`pros: ${tsString(pros)},`);
      if (cons) lines.push(`cons: ${tsString(cons)},`);
      lines.push(`favorite: ${favorite},`);
      lines.push(`played: ${played},`);
      if (officialUrl) lines.push(`officialUrl: ${tsString(officialUrl)},`);
      lines.push(`downloads: ${buildDownloadsCode(id)},`);

      const code = '{\n' + indentBlock(lines.join('\n'), 2) + '\n},';

      document.getElementById('output').value = code;
      document.getElementById('output-section').classList.remove('hidden');
      document.getElementById('output-section').scrollIntoView({ behavior: 'smooth' });
    }

    function copyCode() {
      const output = document.getElementById('output');
      output.select();
      navigator.clipboard
        .writeText(output.value)
        .then(() => {
          const label = document.getElementById('copy-label');
          label.textContent = 'Copiato!';
          setTimeout(() => { label.textContent = 'Copia codice'; }, 1500);
        })
        .catch(() => {
          // Fallback per browser/contesti senza Clipboard API: il testo è già selezionato,
          // basta premere manualmente Ctrl+C / Cmd+C.
        });
    }

    function resetForm() {
      document.getElementById('game-form').reset();
      document.getElementById('downloads-container').innerHTML = '';
      downloadRowCount = 0;
      slugTouched = false;
      coverTouched = false;
      document.getElementById('gameId').dataset.touched = 'false';
      setRating(0);
      DOWNLOAD_DEFAULTS.forEach(createDownloadRow);
      document.getElementById('output-section').classList.add('hidden');
    }

    initIconSuggestions();
    initAutoFields();
    renderRatingStars();
    DOWNLOAD_DEFAULTS.forEach(createDownloadRow);
  </script>
</body>
